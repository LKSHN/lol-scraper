services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: lol_scraper
      POSTGRES_PASSWORD: lol_scraper
      POSTGRES_DB: lol_scraper
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lol_scraper"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
